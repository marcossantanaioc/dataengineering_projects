name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    
    # 1. Install uv and enable caching for faster runs
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        
    # 2. Let uv handle downloading and setting up the correct Python version
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
      
    # 3. uv sync does all the heavy lifting automatically
    - name: Install dependencies
      run: uv sync
      
    # 4. Use 'uv run' to execute commands inside the uv environment
    - name: Lint with ruff
      run: |
          uv run ruff check --output-format=github .
          
    - name: Debug Python Path
      run: uv run python -c "import sys; print(sys.path)"
      
    - name: Test with pytest
      run: |
          uv run pytest tests/