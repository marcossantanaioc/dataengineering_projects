name: Tests and Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Keeps the manual run button!

permissions:
  contents: read # Secure default

jobs:
  lint_and_test:
    name: Lint and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
      
    - name: Install dependencies
      run: uv sync
      
    - name: Lint with ruff
      run: |
          uv run ruff check --output-format=github .
          
    - name: Debug Python Path
      run: uv run python -c "import sys; print(sys.path)"
      
    - name: Test with pytest
      run: |
          uv run pytest tests/ -vv